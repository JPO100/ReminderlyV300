<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reminderly</title>
    <script type="module" crossorigin src="/assets/index-COAgt5oa.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CwQ3nheN.css">
    <script>
      (function () {
        const remindersStorageKey = "reminderly.reminders.v1";
        const permissionStorageKey = "reminderly.notifications.permission.requested";

        function getLocalNotificationsPlugin() {
          return window.Capacitor?.Plugins?.LocalNotifications ?? null;
        }

        function getReminderNotificationId(reminderId) {
          return Array.from(String(reminderId)).reduce(function (accumulator, character) {
            return ((accumulator * 31) + character.charCodeAt(0)) % 2147483647;
          }, 1);
        }

        function loadNotificationPayloads() {
          try {
            const rawValue = window.localStorage.getItem(remindersStorageKey);
            if (!rawValue) {
              return [];
            }

            const reminders = JSON.parse(rawValue);
            if (!Array.isArray(reminders)) {
              return [];
            }

            return reminders
              .filter(function (reminder) {
                if (!reminder) return false;
                if (reminder.completedAt != null) return false;
                if (reminder.deletedAt != null) return false;
                if (!reminder.schedule || reminder.schedule.kind !== "scheduled") return false;
                if (typeof reminder.schedule.date !== "string" || !reminder.schedule.date) return false;
                if (typeof reminder.schedule.time !== "string" || !reminder.schedule.time) return false;

                const dateParts = reminder.schedule.date.split("-").map(Number);
                const timeParts = reminder.schedule.time.split(":").map(Number);
                if (dateParts.length !== 3 || timeParts.length !== 2) return false;

                const at = new Date(
                  dateParts[0],
                  dateParts[1] - 1,
                  dateParts[2],
                  timeParts[0],
                  timeParts[1],
                  0,
                  0
                );

                return at.getTime() > Date.now();
              })
              .map(function (reminder) {
                const dateParts = reminder.schedule.date.split("-").map(Number);
                const timeParts = reminder.schedule.time.split(":").map(Number);
                const at = new Date(
                  dateParts[0],
                  dateParts[1] - 1,
                  dateParts[2],
                  timeParts[0],
                  timeParts[1],
                  0,
                  0
                );

                return {
                  id: getReminderNotificationId(reminder.id),
                  title: "Reminderly",
                  body: String(reminder.displayText ?? reminder.originalText ?? "Reminder"),
                  schedule: { at: at },
                  extra: { reminderId: reminder.id }
                };
              });
          } catch (error) {
            console.error("[ReminderlyNotifications] Failed to build payloads.", error);
            return [];
          }
        }

        async function syncReminderNotifications() {
          const localNotifications = getLocalNotificationsPlugin();
          console.log("[ReminderlyNotifications] LocalNotifications available:", Boolean(localNotifications));
          if (!localNotifications) {
            return;
          }

          try {
            if (!window.localStorage.getItem(permissionStorageKey)) {
              const permission = await localNotifications.requestPermissions();
              console.log("[ReminderlyNotifications] requestPermissions result:", permission);
              window.localStorage.setItem(permissionStorageKey, "true");

              if (permission.display !== "granted") {
                return;
              }
            }

            const pending = await localNotifications.getPending();
            console.log("[ReminderlyNotifications] pending notifications:", pending);

            if (pending.notifications.length > 0) {
              await localNotifications.cancel({
                notifications: pending.notifications.map(function (notification) {
                  return { id: notification.id };
                })
              });
            }

            const notifications = loadNotificationPayloads();
            console.log("[ReminderlyNotifications] notifications to schedule:", notifications);
            console.log("[ReminderlyNotifications] current local time:", new Date().toString());

            if (notifications.length > 0) {
              await localNotifications.schedule({ notifications: notifications });
              const pendingAfterSchedule = await localNotifications.getPending();
              console.log("[ReminderlyNotifications] pending after schedule:", pendingAfterSchedule);
            }
          } catch (error) {
            console.error("[ReminderlyNotifications] Sync failed.", error);
          }
        }

        const originalSetItem = window.localStorage.setItem.bind(window.localStorage);
        window.localStorage.setItem = function (key, value) {
          originalSetItem(key, value);
          if (key === remindersStorageKey) {
            void syncReminderNotifications();
          }
        };

        window.addEventListener("storage", function (event) {
          if (event.key === remindersStorageKey) {
            void syncReminderNotifications();
          }
        });

        window.addEventListener("load", function () {
          window.setTimeout(function () {
            void syncReminderNotifications();
          }, 300);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
